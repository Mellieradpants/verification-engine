
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signal Tool</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f7f8;
      color: #16181d;
    }
    .app {
      max-width: 980px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }
    .panel {
      background: white;
      border: 1px solid #d9dee6;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }
    h1, h2 { margin-top: 0; }
    textarea {
      width: 100%;
      min-height: 220px;
      padding: 12px;
      border: 1px solid #cbd3dd;
      border-radius: 10px;
      font: inherit;
    }
    .controls {
      display: flex;
      gap: 10px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    button {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font: inherit;
      cursor: pointer;
      background: #1a4cff;
      color: white;
      font-weight: 700;
    }
    button.secondary {
      background: #eef2f7;
      color: #223042;
    }
    .hidden { display: none; }
    .card {
      border: 1px solid #e4e8ee;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 12px;
      background: #fbfcfe;
    }
    .small-label {
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-size: 0.78rem;
      color: #687281;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .badge-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 10px 0;
    }
    .badge {
      display: inline-block;
      padding: 5px 9px;
      border-radius: 999px;
      background: #edf1f7;
      color: #314257;
      font-size: 0.88rem;
    }
    .type { background: #e7f0ff; color: #1541b3; }
    .flag { background: #fff3df; color: #8f5b00; }
    ul { margin: 8px 0 0; padding-left: 18px; }
    pre {
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 0.9rem;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="panel">
      <h1>Signal Tool</h1>
      <p>One input. Three constrained outputs: Meaning, Origin, Verification.</p>

      <label for="inputText"><strong>Paste text</strong></label>
      <textarea id="inputText" placeholder="Paste text here..."></textarea>

      <div class="controls">
        <button id="analyzeBtn">Analyze</button>
        <button id="sampleBtn" class="secondary">Load Sample</button>
        <button id="clearBtn" class="secondary">Clear</button>
      </div>
    </section>

    <section id="results" class="hidden">
      <section class="panel">
        <h2>Meaning</h2>
        <div id="meaningPanel"></div>
      </section>

      <section class="panel">
        <h2>Origin</h2>
        <div id="originPanel"></div>
      </section>

      <section class="panel">
        <h2>Verification</h2>
        <div id="verificationPanel"></div>
      </section>

      <details class="panel">
        <summary>Processing Trace</summary>
        <pre id="debugPanel"></pre>
      </details>
    </section>
  </main>

  <script>
    const assertionTypes = [
      {
        id: "scientific",
        label: "Scientific",
        recordSystems: ["PubMed", "ClinicalTrials.gov", "NIH", "FDA", "CDC"],
        signals: ["study", "trial", "medical", "clinical", "research", "journal"]
      },
      {
        id: "policy_legal",
        label: "Policy / Legal",
        recordSystems: ["Congress.gov", "Federal Register", "CourtListener", "GovInfo"],
        signals: ["bill", "act", "law", "rule", "regulation", "section", "agency", "congress"]
      },
      {
        id: "statistical",
        label: "Statistical",
        recordSystems: ["U.S. Census Bureau", "BLS", "BEA", "FRED", "World Bank Data"],
        signals: ["percent", "%", "rate", "increase", "decrease", "total", "count"]
      },
      {
        id: "infrastructure_energy",
        label: "Infrastructure / Energy",
        recordSystems: ["EIA", "FERC", "NERC", "WECC", "Utility Filings"],
        signals: ["bridge", "broadband", "grid", "energy", "utility", "infrastructure", "power"]
      },
      {
        id: "predictive",
        label: "Predictive",
        recordSystems: ["Forecast Reports", "Model Documentation", "Track Record Comparisons"],
        signals: ["will", "likely", "expected", "forecast", "projected"]
      },
      {
        id: "other",
        label: "Other",
        recordSystems: ["Needs Human Review"],
        signals: []
      }
    ];

    function splitSentences(text) {
      return text
        .split(/(?<=[.!?])\s+/)
        .map(s => s.trim())
        .filter(Boolean);
    }

    function detectAssertions(sentences) {
      const markers = [
        /\b(is|are|was|were|will|would|should|must|can|could|reported|announced|passed|increased|decreased|showed|found|establishes|expands|directs)\b/i,
        /\b\d+(\.\d+)?%?\b/,
        /\baccording to\b/i,
        /\bsection\b/i
      ];

      return sentences.filter(sentence => {
        if (sentence.length < 18) return false;
        return markers.some(rx => rx.test(sentence));
      });
    }

    function generatePlainMeaning(text) {
      if (!text) {
        return "This text makes a claim, but there was not enough information to summarize it clearly.";
      }

      let result = text;

      result = result.replace(/infrastructure/gi, "things like bridges, internet access, and electrical systems");
      result = result.replace(/modernization/gi, "updating older systems");
      result = result.replace(/program/gi, "a government plan or initiative");

      const sentences = result
        .split(/(?<=[.!?])\s+/)
        .map(s => s.trim())
        .filter(Boolean);

      if (sentences.length === 0) {
        return "This text makes a claim, but there was not enough information to summarize it clearly.";
      }


    function classifyAssertion(sentence) {
      const lower = sentence.toLowerCase();
      let best = assertionTypes[assertionTypes.length - 1];
      let bestScore = 0;

      for (const type of assertionTypes) {
        let score = 0;
        for (const signal of type.signals) {
          if (lower.includes(signal.toLowerCase())) score += 2;
        }
        if (type.id === "statistical" && /\b\d+(\.\d+)?%?\b/.test(sentence)) score += 2;
        if (score > bestScore) {
          bestScore = score;
          best = type;
        }
      }

      return best;
    }

    function buildFlags(typeId, sentence) {
      const flags = [];

      if (!/\b(according to|report|study|section|act|bill|court|agency|department|published)\b/i.test(sentence)) {
        flags.push("source_path_incomplete");
      }

      if (typeId === "predictive") {
        flags.push("forecast_model_needed");
      }

      if (!flags.length) {
        flags.push("verification_path_available");
      }

      return flags;
    }

    function extractOrigin(text) {
      let sourceDomain = "";
      let publisher = "";
      let author = "";
      let timestamp = "";
      const originSignals = [];

      const urlMatch = text.match(/https?:\/\/[^\s]+/i);
      if (urlMatch) {
        try {
          const url = new URL(urlMatch[0]);
          sourceDomain = url.hostname;
          originSignals.push("source_url:" + url.hostname);
          if (url.hostname.includes(".gov")) publisher = "Government domain";
          if (url.hostname.includes("congress.gov")) publisher = "Congress.gov";
        } catch (_) {}
      }

      const timeMatch = text.match(/\b((19|20)\d{2}|January|February|March|April|May|June|July|August|September|October|November|December)\b/i);
      if (timeMatch) {
        timestamp = timeMatch[0];
        originSignals.push("time_signal:" + timestamp);
      }

      return {
        sourceDomain,
        publisher,
        author,
        timestamp,
        ownershipContext: sourceDomain.includes(".gov")
          ? "Official government domain"
          : sourceDomain
          ? "Non-government domain"
          : "No source URL detected in text",
        originSignals
      };
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function analyze() {
      const rawText = document.getElementById("inputText").value.trim();

      if (!rawText) {
        alert("Paste some text first.");
        return;
      }

      const sentences = splitSentences(rawText);
      const assertions = detectAssertions(sentences);
      const origin = extractOrigin(rawText);

      const actionSignals = assertions.filter(a =>
        /\b(increase|decrease|expand|reduce|fund|ban|require|allow|renew|apply|report|announce|pass|establish|direct)\b/i.test(a)
      );

      const timelineSignals = [];
      assertions.forEach(text => {
        const years = text.match(/\b(19|20)\d{2}\b/g);
        if (years) timelineSignals.push(...years);
        const relative = text.match(/\b(today|tomorrow|this year|next year|current|effective)\b/i);
        if (relative) timelineSignals.push(relative[0]);
      });

      document.getElementById("meaningPanel").innerHTML = `
        <div class="card">
          <div class="small-label">Plain Meaning</div>
          <p>${escapeHtml(generatePlainMeaning(rawText))}</p>
        </div>
        <div class="card">
          <div class="small-label">Detected Assertions</div>
          ${assertions.length ? `<ul>${assertions.map(a => `<li>${escapeHtml(a)}</li>`).join("")}</ul>` : `<p>No assertions detected.</p>`}
        </div>
        <div class="card">
          <div class="small-label">Action Signals</div>
          ${actionSignals.length ? `<ul>${actionSignals.map(a => `<li>${escapeHtml(a)}</li>`).join("")}</ul>` : `<p>No action signals detected.</p>`}
        </div>
        <div class="card">
          <div class="small-label">Timeline Signals</div>
          ${timelineSignals.length ? `<ul>${[...new Set(timelineSignals)].map(t => `<li>${escapeHtml(t)}</li>`).join("")}</ul>` : `<p>No timeline signals detected.</p>`}
        </div>
      `;

      document.getElementById("originPanel").innerHTML = `
        <div class="card"><div class="small-label">Source Domain</div><p>${escapeHtml(origin.sourceDomain || "None detected")}</p></div>
        <div class="card"><div class="small-label">Publisher</div><p>${escapeHtml(origin.publisher || "None detected")}</p></div>
        <div class="card"><div class="small-label">Author</div><p>${escapeHtml(origin.author || "None detected")}</p></div>
        <div class="card"><div class="small-label">Timestamp Signal</div><p>${escapeHtml(origin.timestamp || "None detected")}</p></div>
        <div class="card"><div class="small-label">Ownership / Provenance Context</div><p>${escapeHtml(origin.ownershipContext)}</p></div>
      `;

      document.getElementById("verificationPanel").innerHTML = assertions.length
        ? assertions.map(text => {
            const type = classifyAssertion(text);
            const flags = buildFlags(type.id, text);
            return `
              <div class="card">
                <div class="small-label">Assertion</div>
                <p>${escapeHtml(text)}</p>
                <div class="badge-row">
                  <span class="badge type">${escapeHtml(type.label)}</span>
                  ${flags.map(f => `<span class="badge flag">${escapeHtml(f)}</span>`).join("")}
                </div>
                <div class="small-label">Expected Record Systems</div>
                <ul>${type.recordSystems.map(r => `<li>${escapeHtml(r)}</li>`).join("")}</ul>
              </div>
            `;
          }).join("")
        : "<p>No verification items to display.</p>";

      document.getElementById("debugPanel").textContent = JSON.stringify({
        sentencesSplit: sentences.length,
        candidateAssertions: assertions.length,
        assertionsReturned: assertions.length,
        inputPreview: rawText.slice(0, 220)
      }, null, 2);

      document.getElementById("results").classList.remove("hidden");
    }

    function loadSample() {
      document.getElementById("inputText").value =
`Section 103 establishes a $108 billion federal bridge repair program beginning in 2026. According to the Department of Transportation, priority funding will go to structurally deficient bridges in interstate corridors. The bill also expands broadband deployment by $50 billion and directs grid modernization funding of $48 billion through the Department of Energy. Analysts say the measure will likely reduce long-term maintenance costs.`;
    }

    function clearAll() {
      document.getElementById("inputText").value = "";
      document.getElementById("results").classList.add("hidden");
      document.getElementById("meaningPanel").innerHTML = "";
      document.getElementById("originPanel").innerHTML = "";
      document.getElementById("verificationPanel").innerHTML = "";
      document.getElementById("debugPanel").textContent = "";
    }

    document.getElementById("analyzeBtn").addEventListener("click", analyze);
    document.getElementById("sampleBtn").addEventListener("click", loadSample);
    document.getElementById("clearBtn").addEventListener("click", clearAll);
  </script>
</body>
</html>
